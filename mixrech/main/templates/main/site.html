<body>
    <div class="link-container">
        <svg viewBox="0 0 500 700">
            <defs>
                <style>
                    .st0 {
                       stroke: #FFFFFF;
                       fill: #FFFFFF;
                       stroke-miterlimit: 10;
                     }
                </style>
            </defs>
            <rect class="st0" x="104.66" y="262.43" width="105.23" height="9.19" rx="4.6" ry="4.6"/>
            <rect class="st0" x="104.66" y="287.45" width="105.23" height="9.19" rx="4.6" ry="4.6"/>

        </svg>
    </div>
    <script>
        document.querySelector('.link-container').addEventListener('click', () => {
                      document.querySelector('.option-form').style.display = 'block';
                  });
    </script>
    <div class="option-form" style="display: none">
        <h3>Приложения</h3>
        <button class="exit-menu" style="width: 30px; height: 30px; background: transparent">
            <svg width="30" height="30" viewBox="0 0 10 30" stroke="white">
                <line class="st0" y1="17.12" x2="16.71"/>
                <line class="st0" x1="-.28" y1="-.31" x2="16.99" y2="17.43"/>
            </svg>
        </button>
        <p></p>
        <script>
            document.querySelector('.exit-menu').addEventListener('click', () => {
                       document.querySelector('.option-form').style.display = 'none';
                   });
        </script>
        <a href="https://chat.mixrech.com">
            <img src="{% static 'main/png/mixchat_logo.png' %}" style="width: 70px; height: 70px; display: block;">
            MixChat
        </a>
        <p>Информация</p>
        <button class="project_support">
            <img src="{% static 'main/png/project_support_icon.png' %}" style="height: 25px; color: white">
            <a href="https://www.donationalerts.com/r/mixrech" style="color: white">Поддержка проекта</a>
        </button>
    </div>
    <div class="container">
        <h1>MixRech</h1>
        <form class="search-form" method="get" action="/search">
            <div class="search-input-wrapper">
                <input type="search" name="query" placeholder="Введите поисковый запрос или URL" aria-label="Поиск">
            </div>
            <label for="selectImage" class="action-button">
                <img src="{% static 'search/png/photo.png' %}" style="width: 40%; height: 50%;">
            </label>
            <label for="writeVoice" class="action-button">
                <img src="{% static 'search/png/microphone.png' %}" style="width: 40%; height: 50%;">
            </label>
            <input type="button" id="writeVoice" style=" display: none; width: 40%; height: 100%;"/>
            <button class="btn btn-outline-success" type="submit">
                <img src="{% static 'main/png/search.png' %}" style="align-items: center; width: 70%; height: 50%;">
            </button>
        </form>
        <form method="post" action="/search/search_by_image" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" id="selectImage" name="image" style="display: none" accept="image/*"/>
            <div class="image-preview">
                <img id="preview" src="{% static 'search/png/photo.png' %}" style="display: none; width: 200px; height: 200px;">
                <button id="image" class="search-image-btn" type="submit" style="display: none;">
                    <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; margin-right: 8px;">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Поиск по картинке
                </button>
            </div>
        </form>
    </div>
    <script>
      document.getElementById('selectImage').addEventListener('change', function() {
        const btn = document.getElementById('image');
        const file = event.target.files[0];
        console.log(file)
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            const image = document.getElementById('preview')
            document.getElementById('preview').src = e.target.result;
            image.style = 'inline';
          };
          reader.readAsDataURL(file);
        }
        if (this.files && this.files.length > 0) {
          btn.style.display = 'block'; // или 'block', в зависимости от дизайна
        } else {
          btn.style.display = 'none';
        }
      });
    </script>
    <script src="{% static 'main/js/voice_file.js' %}"></script>
