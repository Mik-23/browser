<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MixRech</title>
        {% load static %}
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/font-flaticon@1.0.0/css/font-flaticon.css">
        <link rel="stylesheet" href="{% static 'search/css/static.css' %}">
        <link rel="icon" href="{% static 'main/png/favicon.ico' %}">
    </head>
    <body>
        <h1><a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">MixRech</a></h1>
        <form method="get" action="#" style="display: inline;">
            <input type="text" name="query" value="{{ query }}" placeholder="Введите запрос" style="margin-right: 10px;">
            <button type="submit" formaction="{% url 'search' %}" style="margin-right: 10px;">Поиск</button>
            <button type="submit" formaction="{% url 'images' %}" style="margin-right: 10px;">Картинки</button>
            <button type="submit" formaction="{% url 'videos' %}" style="margin-right: 10px;">Видео</button>
        </form>
        <ul>
            {% if results %}
            <div>
                {% for video in results %}
                    <div class="col-md-4 mb-4">
                        <div class="card">
                            {% if video.thumbnail %}
                                <img src="{{ video.thumbnail }}" alt="Thumbnail" class="card-img-top" style="max-width: 100%; height: auto;">
                            {% endif %}
                            <div class="card-body">
                                <h5 class="card-title">{{ video.title }}</h5>
                                <a href="{{ video.url }}" class="btn btn-primary">Смотреть видео</a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
            {% else %}
                <p>Видео не найдены.</p>
            {% endif %}
            <div>
            {% if page > 1 %}
                <a href="?query={{ query }}&page={{ page|add:-1 }}">Предыдущая</a>
            {% endif %}
                <a href="?query={{ query }}&page={{ page|add:1 }}">Следующая</a>
            </div>
        </ul>
    </body>

    </html>
