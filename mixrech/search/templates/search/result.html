<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixRech</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/font-flaticon@1.0.0/css/font-flaticon.css">
    <link rel="stylesheet" href="{% static 'search/css/static.css' %}">
    <link rel="icon" href="{% static 'main/png/favicon.ico' %}">
</head>
<body>
    <h2><a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">MixRech</a></h2>
    <form method="get" action="{% url 'search' %}" style="display: inline;">
        <input type="text" name="query" value="{{ query }}" placeholder="Введите запрос" style="margin-right: 10px;">
        <button type="submit" formaction="{% url 'search' %}" style="margin-right: 10px;">Поиск</button>
        <button type="submit" formaction="{% url 'images' %}" style="margin-right: 10px;">Картинки</button>
        <button type="submit" formaction="{% url 'videos' %}" style="margin-right: 10px;">Видео</button>
    </form>
    <div class="results-container">
        <ul>
            {% if results %}
                {% for result in results %}
                <h3>
                    <a href="{{ result.url }}">
                        <img src="{{ result.favicon_url }}"  style="width: 20px; height: 20px; vertical-align: middle; margin-right: 5px;">
                        {{ result.title }}
                    </a>
                </h3>
                <li>
                    <a href="{{ result.url }}">{{ result.url }}</a>
                </li>
                {% endfor %}
            {% else %}
                <li>Нет результатов.</li>
            {% endif %}
        </ul>
        <div class="pagination">
            {% if page > 1 %}
                <a href="?query={{ query }}&page={{ page|add:-1 }}">Предыдущая</a>
            {% endif %}
            <a href="?query={{ query }}&page={{ page|add:1 }}">Следующая</a>
        </div>
    </div>
</body>
</html>
