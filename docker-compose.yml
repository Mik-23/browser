version: '3.8'

services:
   mixrech:
      build: ./mixrech
      command: gunicorn mixrech.wsgi:application --bind 0.0.0.0:8000 --timeout 120
      volumes:
      - .:/app
      - media_data:/mixchat/main/media_v4
      environment:
      - MEDIA_ROOT=/mixchat/main/media_v4
      ports:
         - "8000:8000"

   mixchat:
      build: ./mixchat
      command: gunicorn mixchat.wsgi:application --bind 0.0.0.0:8001 --timeout 120
      volumes:
      - .:/app
      ports:
         - "8001:8001"
         
   nginx:
      image: nginx:1.25.3
      volumes:
         - ./nginx.conf:/etc/nginx/nginx.conf:ro
         - media_data:/app/media/mixchat/
         - ./mixrech/staticfiles:/app/staticfiles/mixrech/
         - ./mixchat/staticfiles:/app/staticfiles/mixchat/
         - /etc/letsencrypt/live/mixrech.com/fullchain.pem:/etc/letsencrypt/live/mixrech.com/fullchain.pem
         - /etc/letsencrypt/live/mixrech.com/privkey.pem:/etc/letsencrypt/live/mixrech.com/privkey.pem
         
      depends_on:
        - mixrech
        - mixchat
      ports:
        - "80:80"
        - "443:443"

   volumes:
      media_data:
