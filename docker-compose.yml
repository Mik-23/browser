version: '3.8'

services:
   mixrech:
      build: .
      command: gunicorn mixrech.wsgi:application --bind 0.0.0.0:8000 --timeout 120
      volumes:
      - .:/app
      ports:
         - "8000:8000"
         
   nginx:
      image: nginx:1.25.3
      volumes:
         - ./nginx.conf:/etc/nginx/nginx.conf:ro
         - ./staticfiles:/app/staticfiles/
         - /etc/letsencrypt/live/mixrech.com/fullchain.pem:/etc/ssl/certs/mixrech.crt
         - /etc/letsencrypt/live/mixrech.com/privkey.pem:/etc/ssl/private/privkey.key
         - /etc/letsencrypt/live/mixrech.com/fullchain.pem:/etc/ssl/certs/intermediate.crt
         
      depends_on:
        - mixrech
      ports:
        - "80:80"
        - "443:443"
