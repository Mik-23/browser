version: '3.8'

services:
   web:
      build: .
      command: gunicorn porno_chrome.wsgi:application --bind 0.0.0.0:8000 --timeout 120
      volumes:
      - .:/app
      ports:
         - "8000:8000"
         
   nginx:
      image: nginx:1.25.3
      volumes:
         - ./nginx.conf:/etc/nginx/nginx.conf:ro
         - static_volume:/app/staticfiles/
         
      depends_on:
        - web
      ports:
        - "80:80"
        
volumes:
      static_volume:
