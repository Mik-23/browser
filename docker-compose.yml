version: '3.8'

services:
   web:
      build: .
      command: gunicorn porno_chrome.wsgi:application --bind 0.0.0.0:8000
      volumes:
         - .:/app
      ports:
         - "8000:8000"
   nginx:
      image: nginx:1.25.3
      volumes:
         - ./nginx.conf:/etc/nginx/nginx.conf:ro
         - ./configs:/etc/nginx/conf.d:ro
         - ./data:/data/:ro  # Убедитесь, что здесь есть путь к статическим файлам
         - ./app/staticfiles:/app/staticfiles:ro 
 
