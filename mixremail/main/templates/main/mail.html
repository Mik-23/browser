<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixremail</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/static.css' %}">
</head>
<body>

    <h1>Mixremail</h1>
    <div class="send-container">
        <button id="openModalBtn">
            <img src="{% static 'main/png/send.png' %}">
        </button>
        <button id="sendToBasketBtn">
            <img src="{% static 'main/png/basket.png' %}">
        </button>
    </div>
    <button id="inboxBtn">Входящие</button>
    <button id="sentBtn">Отправленные</button>
    <button id="basketBtn">Корзина</button>
    <div class="container">
        <div id="inbox" class="message-list active">
            <h2>Входящие сообщения ({{ messages|length }})</h2>
            <ul class="ingoing-message-list"></ul>
        </div>

        <!-- Модальное окно для отправки сообщения -->
        <div id="myModal" class="modal">
          <div class="modal-content">
              <span class="close">&times;</span>
              <h2>Отправить сообщение</h2>
              <form id="sendMessageForm">
                  <label for="recipient">Кому:</label><br>
                  <input type="text" id="recipient" name="recipient"><br><br>
                  <label for="content">Сообщение:</label><br>
                  <textarea id="content" name="content"></textarea><br><br>
                  <button type="submit">Отправить</button>
              </form>
          </div>
        </div>

        <script src="{% static 'main/js/send_in_basket.js' %}"></script>

        <div id="sent" class="message-list">
            <h2>Отправленные сообщения ({{ messages|length }})</h2>
            <ul class="outgoing-message-list " ></ul>
        </div>


        <div id="basket" class="message-list">
            <h2>Корзина ({{ messages|length }})</h2>
            <ul class="basket-message-list " ></ul>
        </div>

        <script src="{% static 'main/js/get_recipient_messages.js' %}"></script>
        <script src="{% static 'main/js/get_send_messages.js' %}"></script>
        <script src="{% static 'main/js/get_basket.js' %}"></script>
        <script src="{% static 'main/js/send_message.js' %}"></script>
    </div>

</body>
</html>
