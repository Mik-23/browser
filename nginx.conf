server {
       listen 80;
       server_name 0.0.0.0;  # Замените на ваш домен

       location /static/ {
           alias /app/static/ # Укажите путь к вашим статическим файлам
       }

       location / {
           include proxy_params;
           proxy_pass http://127.0.0.1:8000;  # Или укажите порт
       }
   }
