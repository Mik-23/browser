server {
       listen 80;
       server_name 158.160.130.157;  # Замените на ваш домен

       location /static/ {
           root /path/to/your/project;  # Укажите путь к вашим статическим файлам
       }

       location / {
           include proxy_params;
           proxy_pass http://127.0.0.1:8000;  # Или укажите порт
       }
   }