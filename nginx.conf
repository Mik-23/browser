user www-data;
worker_processes 1;  # Количество рабочих процессов

events {
    worker_connections 1024;  # Максимальное количество соединений на рабочий процесс
}

http {
    include /etc/nginx/mime.types;  # Включение типов MIME (по желанию)
    default_type application/octet-stream;  # Установка типа по умолчанию

    server {
	listen 80;
	server_name mixrech.com www.mixrech.com;
	return 301 https://mixrech.com$request_uri;
    }
	
    server {
        listen 443 ssl;
        ssl_certificate /etc/ssl/certs/mixrech.crt;
        ssl_certificate_key /etc/ssl/private/privkey.key;
	ssl_trusted_certificate /etc/ssl/certs/intermediate.crt;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:!RC4:!MD5:!aNULL:!EXPORT:!DES:!3DES:!CAMELLIA:!SEED:!IDEA:!RC4';
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4;

        server_name mixrech.com www.mixrech.com;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /static/ {
            alias /app/staticfiles_1/;
            try_files $uri $uri/ =404;
        }

        location /mixrech/ {
            proxy_pass http://158.160.133.169:8000;  # Порт, на котором работает mixrech
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

	    error_page 404 /404.html;
            error_page 500 502 503 504 /50x.html;
    	}

	location = /50x.html {
            root html;
	    internal;
        }
    }
    server {
	listen 80;
	server_name chat.mixrech.com;
	return 301 https://chat.mixrech.com$request_uri;
    }
	
    server {
        listen 443 ssl;
        ssl_certificate /etc/ssl/certs/mixrech.crt;
        ssl_certificate_key /etc/ssl/private/privkey.key;
	ssl_trusted_certificate /etc/ssl/certs/intermediate.crt;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:!RC4:!MD5:!aNULL:!EXPORT:!DES:!3DES:!CAMELLIA:!SEED:!IDEA:!RC4';
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4;

        server_name chat.mixrech.com;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /static/ {
            alias /app/staticfiles_2/;
            try_files $uri $uri/ =404;
        }


        location /mixchat/ {
            proxy_pass http://158.160.133.169/auth_in_chat;  # Порт, на котором работает mixchat
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

	    error_page 404 /404.html;
            error_page 500 502 503 504 /50x.html;
        }
		
	 location = /50x.html {
             root html;
        }
    }	
}
