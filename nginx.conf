server {
       listen 80;
       server_name 158.160.133.169;  # Замените на ваш домен
       #return 301 https://158.160.133.169$request_uri;

       location /static/ {
           alias /app/porno_chrome/staticfiles/ # Укажите путь к вашим статическим файлам
       }

       location / {
           proxy_pass http://127.0.0.1:8000;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto $scheme;
       }
   }

