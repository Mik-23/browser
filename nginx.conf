server {
       listen 80;
       server_name 158.160.163.63;  # Замените на ваш домен

       location /static/ {
           alias /main/static/;
           alias /search/static/; # Укажите путь к вашим статическим файлам
       }

       location / {
           include proxy_params;
           proxy_pass http://127.0.0.1:8000;  # Или укажите порт
       }
   }
