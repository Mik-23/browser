        label {
            display: block;

        input[type="text"],
        input[type="email"],

            padding: 10px;

        .form-button {

        .links a {
            color: #006E9E;
        }

        .links a:hover {
            color: #00A9F2;
        }
        .down-buttons {
            text-align: center;
            padding: 155px 20px;
            background-color: #2c2c2c;
        }

        .down-buttons button {
            background: transparent;
            border: none;
            margin: 0 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .down-buttons a {
            color: #858585;
            text-decoration: none;
            font-size: 11px;
            transition: opacity 0.3s ease;
        }

        .down-buttons a:hover {
            opacity: 0.8;

<body>

<div class="container">
    <h2>Войти</h2>
    <div class="links">
        <a href="{% url 'auth_in_chat' %}">Войти</a>
        <a href="{% url 'register_in_chat' %}">Зарегистрироваться</a>
    </div>
    <form id="loginForm"> <!-- Добавлен id для формы -->
        <div class="form-group">
            <label for="email">Электронная почта:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div id="errorMessage" class="error-message" style="font-size: 14px;"></div>
        <button class="form-button" type="submit">Войти</button>
    </form>
</div>

<div class="link-container">
    <a href="">
        <button class="form-button" type="submit" style="position: fixed; top: 30px; right: 50px;">
            <img src="{% static 'main/png/load.png' %}" width="50">
        </button>
    </a>
</div>
<div class="down-buttons">
    <button><a href="{% url 'privacy_policy' %}">Политика конфиденциальности</a></button>
    <button><a href="{% url 'agreement' %}">Пользовательское соглашение</a></button>
</div>

<script src="{% static 'main/js/redirect_url.js' %}"></script>

<script>
// Обработчик события для формы входа
document.getElementById('loginForm').addEventListener('submit', (event) => {
    event.preventDefault(); // Предотвращаем стандартное поведение формы
    const email = document.getElementById('email').value; // Получаем значение phone
    const password = document.getElementById('password').value; // Получаем значение пароля
    loginUser(email, password); // Вызов функции входа
});
</script>
