<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="google-site-verification" content="vnjAp1AKyXtiq31oJzrNQ05cxWc7mYnkm1GgrygVYIg" />
    <meta name="yandex-verification" content="8b55df76bf69b889" />
    <title>Mixchat - Новый удобный мессенджер для общения с друзьями и коллегами</title>
    <meta name=”description” content="MixChat - это современный мессенджер, обеспечивающий быстрый и безопасный обмен сообщениями с друзьями и коллегами." />
    <meta name=”keywords” content="мессенджер, messenger, общение, communication" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/static.css' %}">
    <link rel="icon" href="{% static 'main/png/favicon.ico' %}">
</head>
<body>
<div class="messenger">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Mixchat</h1>
            <button id="profile" class="btn" type="submit"><img src="" id="avatar"></button>
            <form id="logout-form" style="top: 10px; right: 95px; border-radius: 10px">
              <button class="btn" type="submit">Выйти</button>
            </form>
        </div>
        <div class="form-group">
            <input type="text" id="userSearch" placeholder="Поиск пользователя..." oninput="searchUsers()">
        </div>

        <div id="userList" class="user-list">
            <ul id="users" style="display: none;"></ul> <!-- Здесь будут отображаться пользователи -->
        </div>

         <div class="chats-header">
             <h2>Чаты</h2>
         </div>

        <div id="chatList" class="chat-list">
            <ul id="chats"></ul> <!-- Здесь будут отображаться чаты -->
        </div>

        <div class="vertical-line"></div>

        <h2 class="message-align" style="display: none;">Сообщения</h2>
    </div>

    <form class="profile-form" id="profileForm" enctype="multipart/form-data" method="POST" style="display: none;">
        {% csrf_token %}
        <div class="form-profile"><img src="" id="photoProfile"></div>
        <div class="form-profile">
            <label for="photo_input">Фотография профиля</label>
            <input type="file" accept="image/*" id="photo_input" name="photo">
        </div>
        <div class="form-profile">
            <label for="name_input">Имя</label>
            <input type="text" id="name_input" name="name">
        </div>
        <div class="form-profile">
            <label for="bio_input">Статус</label>
            <input type="text" id="bio_input" name="bio">
        </div>
        <div class="form-profile">
            <label for="date_birth_input">Дата рождения</label>
            <input type="date" id="date_birth_input" name="date_birth">
        </div>
        <div class="profile-form-buttons">
            <button type="submit" class="save-btn">Сохранить</button>
            <button type="button" class="cancel-btn" id="cancelProfile">Отмена</button>
        </div>
        <script>
            document.querySelector('.save-btn').addEventListener('click', () => {
                const photo = document.getElementById('photo_input').value;
                const name_of_user = document.getElementById('name_input').value;
                const date_birth = document.getElementById('date_birth_input').value;
                const bio = document.getElementById('bio_input').value;
                saveProfile(photo, name_of_user, date_birth, bio)
                getProfile();
                const form = document.getElementById('profileForm');
                form.style.display = 'none'
            });
            document.querySelector('.cancel-btn').addEventListener('click', () => {
                const form = document.getElementById('profileForm');
                form.style.display = 'none'
            });
        </script>
    </form>

    <!-- Поле для ввода сообщения -->
    <div class="main-chat" id="chatWindow" style="display: none; background: #0E1621;">
        <div class="user-name"><img src=""><p></p></div>
        <button class="out-chat" id="outChat">
            <svg viewBox="0 0 24 24" stroke="currentColor";>
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <script>
                document.getElementById('outChat').addEventListener('click', () => {
                const chatWindow = document.getElementById('chatWindow');
                chatWindow.style.display = 'none';
            });
            </script>
        </button>
        <div id="message" class="message-list active">
            <ul class="message-message-list" style="list-style: none; display: flex; flex-direction: column; gap: 20px;"></ul> <!-- Здесь будут отображаться сообщения -->
        </div>

        <div class="input-panel">
            <div class="input-wrapper">
                <input type="text" id="messageContent" placeholder="Введите сообщение...">
            </div>
            <div class="files-container" id="media" style="display: none; width: 100px; background: #172436;">
                <label for="imageInput" class="file-label">
                    <img id="image" src="{% static 'main/png/image.png' %}">
                    <p>Фото</p>
                </label>
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;"/>
                <label for="videoInput" class="file-label">
                    <img id="video" src="{% static 'main/png/video.png' %}">
                    <p>Видео</p>
                </label>
                <input type="file" id="videoInput" accept="video/*" multiple style="display: none;"/>
                <label for="audioInput" class="file-label">
                    <img id="audio" src="{% static 'main/png/audio.png' %}">
                    <p>Аудио</p>
                </label>
                <input type="file" id="audioInput" accept="audio/*" multiple style="display: none;"/>
            </div>
            <button class="mediaIcons" id="mediaButton">
                <svg viewBox="0 0 24 24">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <button class="sent" id="sendMessageButton">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="{% static 'main/js/logout_redirect.js' %}"></script>

<script>
document.getElementById('logout-form').addEventListener('submit', (event) => {
    event.preventDefault();
    logoutUser(); // Вызов функции выхода
});
</script>

<script src="{% static 'main/js/chat.js' %}"></script>

</body>
</html>
