<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация успешна — MixChat</title>
    {% load static %}
    <link rel="icon" href="{% static 'main/png/favicon.ico' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Основной контейнер - две колонки */
        .success-wrapper {
            max-width: 1200px;
            width: 100%;
            background: #2c2c2c;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-wrap: wrap;
        }

        /* Левая панель с информацией */
        .mixchat-info {
            flex: 1;
            min-width: 280px;
            background: linear-gradient(135deg, #1f8f4a 0%, #0f5c2e 100%);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
        }

        .mixchat-info img {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .mixchat-info h2 {
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mixchat-info p {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.9;
            max-width: 280px;
        }

        /* Правая панель с сообщением об успехе */
        .success-container {
            flex: 1;
            min-width: 320px;
            background: #3b3b3b;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        /* Иконка успеха */
        .success-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease;
        }

        .success-icon svg {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-container h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .success-container p {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            padding: 14px 32px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .success-wrapper {
                flex-direction: column;
            }

            .mixchat-info {
                padding: 32px 20px;
            }

            .mixchat-info h2 {
                font-size: 24px;
            }

            .success-container {
                padding: 40px 24px;
            }

            .success-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="success-wrapper">
        <!-- Левая панель: информация о MixChat -->
        <div class="mixchat-info">
            <img src="{% static 'main/png/favicon.ico' %}" alt="MixChat Logo">
            <h2>Добро пожаловать!</h2>
            <p>Вы стали частью сообщества MixChat — безопасного и удобного мессенджера</p>
        </div>

        <!-- Правая панель: сообщение об успехе -->
        <div class="success-container">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1>Регистрация прошла успешно!</h1>
            <p>Теперь вы можете войти в свой аккаунт и начать общение с друзьями и коллегами</p>
            <a href="{% url 'auth_in_chat' %}" class="button">Войти в аккаунт</a>
        </div>
    </div>
</body>
</html>
