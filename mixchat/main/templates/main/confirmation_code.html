<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение регистрации в MixChat</title>
    {% load static %}
    <link rel="icon" href="{% static 'main/png/favicon.ico' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Основной контейнер - две колонки */
        .auth-wrapper {
            max-width: 1200px;
            width: 100%;
            background: #2c2c2c;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-wrap: wrap;
        }

        /* Левая панель с информацией */
        .mixchat-info {
            flex: 1;
            min-width: 280px;
            background: linear-gradient(135deg, #1f8f4a 0%, #0f5c2e 100%);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
        }

        .mixchat-info img {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .mixchat-info h2 {
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mixchat-info p {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.9;
            max-width: 280px;
        }

        /* Правая панель с формой */
        .container {
            flex: 1;
            min-width: 320px;
            background: #3b3b3b;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container h2 {
            text-align: center;
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .info-text {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #ffffff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
        }

        /* Убираем стрелки у поля number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .form-button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .form-button:hover {
            background-color: #218838;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .error-message {
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }

        .resend-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #555;
        }

        .resend-link a {
            color: #28a745;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .resend-link a:hover {
            color: #34ce57;
            text-decoration: underline;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .auth-wrapper {
                flex-direction: column;
            }

            .mixchat-info {
                padding: 32px 20px;
            }

            .mixchat-info h2 {
                font-size: 24px;
            }

            .container {
                padding: 32px 24px;
            }

            .container h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <!-- Левая панель: информация -->
    <div class="mixchat-info">
        <img src="{% static 'main/png/favicon.ico' %}" alt="MixChat Logo">
        <h2>Остался последний шаг</h2>
        <p>Подтвердите свою почту, чтобы начать общение в MixChat</p>
    </div>

    <!-- Правая панель: форма подтверждения -->
    <div class="container">
        <h2>Код подтверждения</h2>
        <div class="info-text">
            Мы отправили код на вашу электронную почту
        </div>
        <form id="codeForm">
            <div class="form-group">
                <label for="reg_code">Введите код подтверждения:</label>
                <input type="number" id="reg_code" name="code" required placeholder="0000">
            </div>
            <div id="alertMessage" class="alert-message"></div>
            <button class="form-button" type="submit">Зарегистрироваться</button>
        </form>

        <div class="resend-link">
            <a href="#" id="resendCodeLink">Не пришёл код? Отправить повторно</a>
        </div>
    </div>
</div>

<script src="{% static 'main/js/confirmation_code.js' %}"></script>

<script>
    // Обработчик для повторной отправки кода
    function resendCode() {
        fetch('/api/resend_code/', {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        }
    })
    .then(res => res.json())
    }
    document.getElementById('resendCodeLink').addEventListener('click', function(e) {
        e.preventDefault();
        // Здесь можно вызвать функцию для повторной отправки кода
        // Например: resendConfirmationCode();
        if (typeof resendCode === 'function') {
            resendCode();
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = 'Отправляем код повторно...';
            alertDiv.style.color = '#9E9E9E'
            setTimeout(() => {
                alertDiv.textContent = 'Код отправлен! Проверьте почту';
                alertDiv.style.color = '#28a745'
                setTimeout(() => {
                    alertDiv.textContent = '';
                }, 3000);
            }, 500);
        } else {
            // Временное уведомление, если функция ещё не подключена
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = 'Не удалось отправить код';
            alertDiv.style.color = '#ff6b6b;'
        }
    });
</script>

</body>
</html>
