name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build image
        run: |
          docker build -t browser_mixrech_1:latest .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 5.129.245.67 >> ~/.ssh/known_hosts

      - name: Transfer docker image
        run: |
          docker save browser_mixrech_1:latest | ssh ${{ secrets.USERNAME }}@5.129.245.67 'docker load'

      - name: Run deployment
        run: |
          ssh ${{ secrets.USERNAME }}@5.129.245.67 "docker run -d --name browser_container browser_mixrech_1:latest && docker cp browser_container:/mixrech/staticfiles ./app/staticfiles/mixrech"
  
  logs:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 5.129.245.67 >> ~/.ssh/known_hosts

      - name: Fetch logs
        run: |
          ssh ${{ secrets.USERNAME }}@5.129.245.67 "docker logs -f browser_container"
