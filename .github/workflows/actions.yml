name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: browser_mixrech_1:latest
    steps:
      - uses: actions/checkout@v2

      - name: Build image
        run: docker build -t browser_mixrech_1:latest .

      - name: Save image to tar
        run: docker save browser_mixrech_1:latest -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: image.tar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: .

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 5.129.245.67 >> ~/.ssh/known_hosts

      - name: Load docker image and deploy
        run: |
          cat image.tar | ssh ${{ secrets.USERNAME }}@5.129.245.67 'docker load'
          ssh ${{ secrets.USERNAME }}@5.129.245.67 "docker run -d --name browser_container browser_mixrech_1:latest && docker cp browser_container:/mixrech/staticfiles ./app/staticfiles/mixrech"
  logs:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 5.129.245.67 >> ~/.ssh/known_hosts

      - name: Fetch logs
        run: |
          ssh ${{ secrets.USERNAME }}@5.129.245.67 "docker logs -f browser_container"
