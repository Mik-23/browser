name: Deploy to Yandex Cloud

on:
   push:
      branches:
         - main  # или ваша основная ветка

jobs:
     deploy:
       runs-on: ubuntu-latest

       steps:
       - name: Checkout code
         uses: actions/checkout@v2

       - name: Debug
         run: echo "SSH_PRIVATE_KEY=${{ secrets.SSH_PRIVATE_KEY }}"

       - name: Set up SSH
         uses: webfactory/ssh-agent@v0.9.0
         with:
           ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

       - name: Add server to known_hosts
         run: |
           mkdir -p ~/.ssh
           ssh-keyscan -H "$IP_ADDRESS" >> ~/.ssh/known_hosts
         env:
           IP_ADDRESS: ${{ secrets.IP_ADRESS }}

       - name: Add SSH key to agent
         run: echo "${{ secrets.SSH_PRIVATE_KEY }}" | ssh-add -

       - name: Deploy to server
         run: |
           ssh ${{ secrets.USERNAME }}@"$IP_ADDRESS" "cd /root/browser && git pull && docker-compose down && docker-compose up --build -d && docker cp browser_mixrech_1:/mixrech/staticfiles ./mixrech && docker cp browser_mixchat_1:/mixchat/staticfiles ./mixchat"
         env:
           IP_ADDRESS: ${{ secrets.IP_ADRESS }}

     logs:
       runs-on: ubuntu-latest
       needs: deploy
       
       steps:
       - name: Set up SSH
         uses: webfactory/ssh-agent@v0.9.0
         with:
           ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

       - name: Add server to known_hosts
         run: |
           mkdir -p ~/.ssh
           ssh-keyscan -H "$IP_ADDRESS" >> ~/.ssh/known_hosts
         env:
           IP_ADDRESS: ${{ secrets.IP_ADRESS }}
          
       - name: Fetch logs
         run: |
           ssh ${{ secrets.USERNAME }}@"$IP_ADDRESS" "cd /root/browser && git pull && docker-compose logs -f"
         env:
           IP_ADDRESS: ${{ secrets.IP_ADRESS }}


