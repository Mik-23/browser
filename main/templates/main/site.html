<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title%}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/static.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/font-flaticon@1.0.0/css/font-flaticon.css">
</head>
<body>
    <h1>{{ title }}</h1>
    <div class="container">
        <div class="features text-center my-6">
            <form class="d-flex" method="get" action="/search">
                <input class="form-control me-2" type="search" name="query" placeholder="Введите поисковый запрос или URL" aria-label="Поиск">
                <button class="btn btn-outline-success" type="submit">Найти</button>
            </form>
        </div>

    </div>
</body>
</html>
